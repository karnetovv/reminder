spring:
  application:
    name: reminder-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        show_sql: false
        jdbc:
          time_zone: UTC

  liquibase:
    enabled: true
    change-log: classpath:liquibase/changelog-master.xml
    default-schema: public

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    liquibase: debug
    root: INFO
    org.springframework.security: INFO