server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  error:
    include-message: always

spring:
  application:
    name: reminder-backend

  # PostgreSQL
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/reminder}
    username: ${DB_USER:reminder}
    password: ${DB_PASSWORD:reminder}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:2}
      connection-timeout: ${DB_CONN_TIMEOUT_MS:30000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}

  # JPA/Hibernate
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none # обязательно, т.к. схема управляется Liquibase
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:false}
        show_sql: ${HIBERNATE_SHOW_SQL:false}
        jdbc:
          time_zone: UTC

  # Liquibase
  liquibase:
    enabled: true
    change-log: classpath:liquibase/changelog-master.xml
    contexts: ${LIQUIBASE_CONTEXTS:dev}
    default-schema: public

  # OAuth2 Resource Server (JWT)
  security:
    oauth2:
      resourceserver:
        jwt:
          # Выберите один вариант:
          # 1) Если используете Keycloak/IdP с discovery:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://keycloak:8080/realms/reminder}
          # 2) Либо напрямую JWK Set:
          # jwk-set-uri: ${OAUTH2_JWK_SET_URI:http://keycloak:8080/realms/reminder/protocol/openid-connect/certs}

  # Email (Spring Mail)
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: ${MAIL_CONN_TIMEOUT_MS:5000}
          timeout: ${MAIL_TIMEOUT_MS:5000}
          writetimeout: ${MAIL_WRITE_TIMEOUT_MS:5000}

# Quartz scheduler
quartz:
  enabled: ${QUARTZ_ENABLED:true}

spring.quartz:
  job-store-type: jdbc
  jdbc:
    initialize-schema: never # в проде лучше миграциями; можно 'always' для dev
  properties:
    org:
      quartz:
        scheduler:
          instanceName: ReminderScheduler
          instanceId: AUTO
        jobStore:
          class: org.quartz.impl.jdbcjobstore.JobStoreTX
          driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
          isClustered: ${QUARTZ_CLUSTERED:false}
          clusterCheckinInterval: 20000
          tablePrefix: QRTZ_
          misfireThreshold: 60000
        threadPool:
          class: org.quartz.simpl.SimpleThreadPool
          threadCount: ${QUARTZ_THREADS:10}
          threadPriority: 5

# Настройки приложения (кастомные)
app:
  timezone: ${APP_TZ:UTC}

  reminders:
    default-page-size: ${REMINDERS_DEFAULT_PAGE_SIZE:20}
    max-page-size: ${REMINDERS_MAX_PAGE_SIZE:100}

  notification:
    enabled: ${NOTIFY_ENABLED:true}
    # кто будет указан отправителем в письме
    email:
      from: ${NOTIFY_EMAIL_FROM:no-reply@reminder.local}
      subject-prefix: ${NOTIFY_EMAIL_SUBJECT_PREFIX:[Reminder]}
    telegram:
      enabled: ${TELEGRAM_ENABLED:true}
      bot-token: ${TELEGRAM_BOT_TOKEN:}
      api-url: ${TELEGRAM_API_URL:https://api.telegram.org}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_HIBERNATE_SQL:OFF}
    org.hibernate.type.descriptor.sql.BasicBinder: ${LOG_LEVEL_HIBERNATE_BIND:OFF}